upstream user_service {
    server user-service:5001;
}

upstream book_service {
    server book-service:5002;
}

upstream exchange_service {
    server exchange-service:5003;
}

server {
    listen 80;

    # ─── User Service ─────────────────────────────
    location /users {
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Book Service ─────────────────────────────
    location /books {
        proxy_pass http://book_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Exchange Service ─────────────────────────
    location /trades {
        proxy_pass http://exchange_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Health check aggregation ─────────────────
    location = /health/user-service {
        proxy_pass http://user_service/health;
    }

    location = /health/book-service {
        proxy_pass http://book_service/health;
    }

    location = /health/exchange-service {
        proxy_pass http://exchange_service/health;
    }

    # ─── Frontend (React UI) ─────────────────────
    location / {
        proxy_pass http://user-interface:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
